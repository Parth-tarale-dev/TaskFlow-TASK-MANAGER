<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="TaskFlow — A high-performance daily task management and productivity monitoring application.">
    <title>TaskFlow — Daily Task Manager</title>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="/static/css/index.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="stylesheet" href="/static/css/animations.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- ═══════════ Sidebar ═══════════ -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                </div>
                <span class="sidebar-title">TaskFlow</span>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section-label">Workspace</div>
                <button class="nav-item active" data-view="tasks">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="m9 12 2 2 4-4"/></svg>
                    Tasks
                </button>
                <button class="nav-item" data-view="timer">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    Timer
                </button>

                <div class="nav-section-label" style="margin-top:var(--space-lg)">Analytics</div>
                <button class="nav-item" data-view="dashboard">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
                    Dashboard
                </button>
                <button class="nav-item" data-view="review">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
                    Daily Review
                </button>
            </nav>

            <div class="sidebar-footer">
                <div class="sidebar-stats">
                    <div class="sidebar-stat">
                        <div class="sidebar-stat-value" id="stat-todo">0</div>
                        <div class="sidebar-stat-label">To Do</div>
                    </div>
                    <div class="sidebar-stat">
                        <div class="sidebar-stat-value" id="stat-progress">0</div>
                        <div class="sidebar-stat-label">Active</div>
                    </div>
                    <div class="sidebar-stat">
                        <div class="sidebar-stat-value" id="stat-done">0</div>
                        <div class="sidebar-stat-label">Done</div>
                    </div>
                    <div class="sidebar-stat">
                        <div class="sidebar-stat-value" id="stat-total">0</div>
                        <div class="sidebar-stat-label">Total</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- ═══════════ Main Content ═══════════ -->
        <main class="main-content">
            <!-- Page Header -->
            <header class="page-header">
                <div class="page-header-left">
                    <h1 class="page-title" id="page-title">My Tasks</h1>
                    <p class="page-subtitle" id="page-subtitle">Manage and organize your daily tasks</p>
                </div>
                <div class="page-header-actions" id="page-actions">
                    <button class="btn btn-primary" onclick="TaskManager.openModal()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                        New Task
                    </button>
                </div>
            </header>

            <!-- Page Body -->
            <div class="page-body">
                <!-- ── Tasks View ── -->
                <section id="view-tasks" class="view active">
                    <div id="task-filters" class="filter-bar"></div>
                    <div id="task-content"></div>
                </section>

                <!-- ── Timer View ── -->
                <section id="view-timer" class="view">
                    <div id="timer-view-content"></div>
                </section>

                <!-- ── Dashboard View ── -->
                <section id="view-dashboard" class="view">
                    <div id="dashboard-stats" class="stats-grid"></div>
                    <div id="dashboard-charts"></div>
                </section>

                <!-- ── Review View ── -->
                <section id="view-review" class="view">
                    <div id="review-view-content"></div>
                </section>
            </div>
        </main>
    </div>

    <!-- ═══════════ Task Modal ═══════════ -->
    <div id="task-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="modal-title">New Task</h2>
                <button class="btn btn-ghost btn-icon" onclick="TaskManager.closeModal()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
            </div>
            <div class="modal-body">
                <form id="task-form" onsubmit="event.preventDefault(); TaskManager.saveTask();">
                    <div class="form-group">
                        <label class="form-label" for="task-title">Title</label>
                        <input type="text" id="task-title" name="task-title" class="form-input" placeholder="What needs to be done?" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="task-desc">Description</label>
                        <textarea id="task-desc" name="task-desc" class="form-textarea" placeholder="Add details..." rows="3"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="task-priority">Priority</label>
                            <select id="task-priority" name="task-priority" class="form-select">
                                <option value="low">Low</option>
                                <option value="medium" selected>Medium</option>
                                <option value="high">High</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="task-status">Status</label>
                            <select id="task-status" name="task-status" class="form-select">
                                <option value="todo" selected>To Do</option>
                                <option value="in_progress">In Progress</option>
                                <option value="done">Done</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="task-due">Due Date</label>
                        <input type="datetime-local" id="task-due" name="task-due" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Tags</label>
                        <div class="tags-input-wrapper" id="tags-input-wrapper">
                            <input type="text" placeholder="Type a tag and press Enter">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="TaskManager.closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="TaskManager.saveTask()">Save Task</button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Scripts -->
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/taskManager.js"></script>
    <script src="/static/js/timer.js"></script>
    <script src="/static/js/dashboard.js"></script>
    <script src="/static/js/review.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
